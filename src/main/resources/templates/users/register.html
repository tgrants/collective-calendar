<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="lv">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reģistrācija — CollectiveCalendar</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
	<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
	<div class="auth-panel">
		<div class="auth-form-box">
			<div class="auth-logo">
				<div class="auth-logo-icon"><i class="bi bi-calendar3"></i></div>
				<div class="auth-logo-name">Collective<br><strong>Calendar</strong></div>
			</div>

			<h1 class="auth-heading">Izveidot kontu</h1>
			<p class="auth-sub">Pievienojieties CollectiveCalendar kopienas</p>

			<form th:action="@{/register}" method="post" th:object="${user}">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

				<div class="cc-form-group">
					<label class="cc-label" for="username">Lietotājvārds</label>
					<input id="username" type="text" class="cc-input"
						   th:field="*{username}"
						   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
						   placeholder="izvēlieties_lietotājvārdu" required>
					<div th:if="${#fields.hasErrors('username')}" class="cc-error" th:errors="*{username}"></div>
				</div>

				<div class="cc-form-group">
					<label class="cc-label" for="email">E-pasts</label>
					<input id="email" type="email" class="cc-input"
						   th:field="*{email}"
						   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
						   placeholder="jūsu@epasts.lv" required>
					<div th:if="${#fields.hasErrors('email')}" class="cc-error" th:errors="*{email}"></div>
				</div>

				<div class="cc-form-group">
					<label class="cc-label" for="password">Parole</label>
					<input id="password" type="password" class="cc-input"
						   th:field="*{password}"
						   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
						   placeholder="vismaz 8 rakstzīmes" required>
					<div th:if="${#fields.hasErrors('password')}" class="cc-error" th:errors="*{password}"></div>
				</div>

				<!--
				<div class="cc-form-group">
					<label class="cc-label" for="confirmPassword">Apstiprināt paroli</label>
					<input id="confirmPassword" type="password" class="cc-input"
						   th:field="*{confirmPassword}"
						   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
						   placeholder="atkārtojiet paroli" required>
					<div th:if="${#fields.hasErrors('confirmPassword')}" class="cc-error" th:errors="*{confirmPassword}"></div>
				</div>
				-->

				<button type="submit" class="btn-cc-primary w-100 justify-content-center py-2 mt-2" style="font-size:15px">
					<i class="bi bi-person-plus"></i> Reģistrēties
				</button>
			</form>

			<p class="text-center mt-4" style="font-size:14px; color: var(--cc-text-muted)">
				Jau ir konts? <a th:href="@{/login}" class="auth-link">Pieteikties</a>
			</p>
		</div>
	</div>

	<div class="auth-visual">
		<div style="font-size:72px; margin-bottom:24px; opacity:.15">🗓️</div>
		<p class="auth-visual-title">Sāciet kopīgi<br>plānot šodien</p>
		<p class="auth-visual-desc">
			Izveidojiet grupas, uzaiciniet kolēģus un draugus, un organizējiet
			notikumus visiem kopā — bez e-pasta virknes un apjukuma.
		</p>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
