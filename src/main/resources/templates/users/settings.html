<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="lv">
<head th:replace="fragments/layout :: head('Iestatījumi')"></head>
<body>

<div th:replace="fragments/layout :: body('Iestatījumi', ~{::main-content})">
    <th:block th:fragment="main-content">

        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="cc-card mb-4">
                    <div class="cc-card-header">
                        <h3 class="cc-card-title">Profils</h3>
                    </div>

                    <div class="d-flex align-items-center gap-4 mb-4">
                        <div class="user-avatar" style="width:56px;height:56px;font-size:22px;border-radius:14px"
                             sec:authentication="name"
                             th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
                        <div>
                            <div style="font-weight:700;font-size:16px" sec:authentication="name">Lietotājs</div>
                            <div style="font-size:13px;color:var(--cc-text-muted)" th:text="${user.email}">epasts@piemers.lv</div>
                            <div class="mt-1">
                                <span th:if="${user.verified}" class="badge bg-success">
                                    <i class="bi bi-patch-check me-1"></i>Verificēts
                                </span>
                                <span th:if="${!user.verified}" class="badge bg-warning text-dark">
                                    <i class="bi bi-exclamation-circle me-1"></i>Nav verificēts
                                </span>
                            </div>
                        </div>
                    </div>

                    <div th:if="${!user.verified}" class="alert alert-warning py-2 mb-3" style="font-size:13px">
                        <i class="bi bi-envelope me-2"></i>
                        E-pasts nav verificēts.
                        <form th:action="@{/settings/send-verification}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-link p-0" style="font-size:13px;vertical-align:baseline">
                                Nosūtīt verifikācijas e-pastu
                            </button>
                        </form>
                    </div>
                </div>

                <div class="cc-card mb-4">
                    <div class="cc-card-header">
                        <h3 class="cc-card-title">Mainīt paroli</h3>
                    </div>

                    <form th:action="@{/settings/change-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="cc-form-group">
                            <label class="cc-label">Pašreizējā parole</label>
                            <input type="password" name="currentPassword" class="cc-input"
                                   placeholder="••••••••" required>
                        </div>
                        <div class="cc-form-group">
                            <label class="cc-label">Jaunā parole</label>
                            <input type="password" name="newPassword" class="cc-input"
                                   placeholder="vismaz 8 rakstzīmes" required>
                        </div>
                        <div class="cc-form-group">
                            <label class="cc-label">Apstiprināt jauno paroli</label>
                            <input type="password" name="confirmPassword" class="cc-input"
                                   placeholder="atkārtojiet paroli" required>
                        </div>
                        <button type="submit" class="btn-cc-primary">
                            <i class="bi bi-lock"></i> Mainīt paroli
                        </button>
                    </form>
                </div>

                <div class="cc-card">
                    <div class="cc-card-header">
                        <h3 class="cc-card-title">Paziņojumu iestatījumi</h3>
                    </div>

                    <form th:action="@{/settings/notifications}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="d-flex flex-column gap-3">
                            <div class="d-flex align-items-center justify-content-between p-3 rounded-2"
                                 style="background:var(--cc-surface-2)">
                                <div>
                                    <div style="font-weight:600;font-size:14px">
                                        <i class="bi bi-calendar-event me-2" style="color:var(--cc-accent)"></i>
                                        Kalendāra paziņojumi
                                    </div>
                                    <div style="font-size:12px;color:var(--cc-text-muted)">
                                        Saņemiet paziņojumus par notikumiem
                                    </div>
                                </div>
                                <div class="form-check form-switch mb-0">
                                    <input class="form-check-input" type="checkbox" role="switch"
                                           id="calendarNotify" name="calendarNotify"
                                           th:checked="${user.calendarNotify}"
                                           style="width:48px;height:24px;cursor:pointer">
                                </div>
                            </div>

                            <div class="d-flex align-items-center justify-content-between p-3 rounded-2"
                                 style="background:var(--cc-surface-2)">
                                <div>
                                    <div style="font-weight:600;font-size:14px">
                                        <i class="bi bi-envelope me-2" style="color:var(--cc-accent)"></i>
                                        Ielūgumu paziņojumi
                                    </div>
                                    <div style="font-size:12px;color:var(--cc-text-muted)">
                                        Saņemiet paziņojumus par ielūgumiem uz grupām
                                    </div>
                                </div>
                                <div class="form-check form-switch mb-0">
                                    <input class="form-check-input" type="checkbox" role="switch"
                                           id="inviteNotify" name="inviteNotify"
                                           th:checked="${user.inviteNotify}"
                                           style="width:48px;height:24px;cursor:pointer">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn-cc-primary mt-4">
                            <i class="bi bi-check-lg"></i> Saglabāt iestatījumus
                        </button>
                    </form>
                </div>

            </div>
        </div>

    </th:block>
</div>

</body>
</html>
