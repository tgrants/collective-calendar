<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="lv">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Atiestatīt paroli — CollectiveCalendar</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
	<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
	<div class="auth-panel">
		<div class="auth-form-box">
			<div class="auth-logo">
				<div class="auth-logo-icon"><i class="bi bi-calendar3"></i></div>
				<div class="auth-logo-name">Collective<br><strong>Calendar</strong></div>
			</div>

			<h1 class="auth-heading">Atiestatīt paroli</h1>
			<p class="auth-sub">Ievadiet savu e-pastu — nosūtīsim saiti paroles atjaunošanai</p>

			<div th:if="${successMessage}" class="alert alert-success py-2 mb-3">
				<i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
			</div>
			<div th:if="${errorMessage}" class="alert alert-danger py-2 mb-3">
				<i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
			</div>

			<form th:action="@{/forgot-password}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

				<div class="cc-form-group">
					<label class="cc-label" for="email">E-pasts</label>
					<input id="email" name="email" type="email" class="cc-input"
						   placeholder="jūsu@epasts.lv" required>
				</div>

				<button type="submit" class="btn-cc-primary w-100 justify-content-center py-2 mt-2">
					<i class="bi bi-send"></i> Nosūtīt saiti
				</button>
			</form>

			<p class="text-center mt-4" style="font-size:14px; color: var(--cc-text-muted)">
				<a th:href="@{/login}" class="auth-link"><i class="bi bi-arrow-left me-1"></i>Atpakaļ uz pieteikšanos</a>
			</p>
		</div>
	</div>
	<div class="auth-visual">
		<div style="font-size:72px; margin-bottom:24px; opacity:.15">🔒</div>
		<p class="auth-visual-title">Drošība ir<br>prioritāte</p>
		<p class="auth-visual-desc">Paroles atiestatīšanas saite tiks nosūtīta uz jūsu verificēto e-pasta adresi.</p>
	</div>
</div>
</body>
</html>
