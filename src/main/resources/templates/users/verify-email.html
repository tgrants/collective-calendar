<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-pasta verifikācija — CollectiveCalendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body style="min-height:100vh;display:grid;place-items:center;background:var(--cc-surface-2)">
    <div style="text-align:center;max-width:420px;padding:32px">
        <div class="auth-logo-icon mx-auto mb-4" style="width:64px;height:64px;font-size:28px;border-radius:16px">
            <i class="bi bi-calendar3"></i>
        </div>

        <div th:if="${success}">
            <div style="font-size:48px;margin-bottom:16px">✅</div>
            <h1 style="font-family:var(--font-display);font-size:24px;font-weight:800;margin-bottom:8px">
                E-pasts verificēts!
            </h1>
            <p style="color:var(--cc-text-muted);font-size:15px;margin-bottom:24px">
                Jūsu e-pasta adrese ir veiksmīgi verificēta. Tagad varat izmantot visas CollectiveCalendar funkcijas.
            </p>
            <a th:href="@{/calendar}" class="btn-cc-primary">
                <i class="bi bi-calendar3"></i> Doties uz kalendāru
            </a>
        </div>

        <div th:if="${!success}">
            <div style="font-size:48px;margin-bottom:16px">❌</div>
            <h1 style="font-family:var(--font-display);font-size:24px;font-weight:800;margin-bottom:8px">
                Verifikācija neizdevās
            </h1>
            <p style="color:var(--cc-text-muted);font-size:15px;margin-bottom:24px" th:text="${errorMessage}">
                Verifikācijas saite nav derīga vai ir beigusies.
            </p>
            <a th:href="@{/settings}" class="btn-cc-outline">
                <i class="bi bi-arrow-left"></i> Doties uz iestatījumiem
            </a>
        </div>
    </div>
</body>
</html>
