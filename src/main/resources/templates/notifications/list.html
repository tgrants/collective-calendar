<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="lv">
<head th:replace="fragments/layout :: head('Paziņojumi')"></head>
<body>

<div th:replace="fragments/layout :: body('Paziņojumi', ~{::main-content})">
	<th:block th:fragment="main-content">

		<div class="page-header">
			<h2>Paziņojumi</h2>
			<form th:if="${not #lists.isEmpty(notifications)}"
				  th:action="@{/notifications/mark-all-seen}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<button type="submit" class="btn-cc-ghost" style="font-size:13px">
					<i class="bi bi-check-all"></i> Atzīmēt visus kā lasītus
				</button>
			</form>
		</div>

		<div th:if="${not #lists.isEmpty(notifications)}" class="cc-card p-0" style="overflow:hidden">
			<div class="notif-list">
				<div th:each="notif : ${notifications}"
					 class="notif-item"
					 th:classappend="${!notif.seen} ? 'unread' : 'read'"
					 th:data-uid="${notif.uid}">

					<div class="notif-dot"></div>

					<div class="notif-icon"
						 th:style="${notif.type == 'INVITE'} ? 'background:#eef1fe;color:#4f6ef7' : 'background:#d6f5e9;color:#0e7950'">
						<i class="bi"
						   th:classappend="${notif.type == 'INVITE'} ? 'bi-envelope' : 'bi-calendar-event'"></i>
					</div>

					<div class="notif-body">
						<div class="notif-title" th:text="${notif.type == 'INVITE' ? 'Jauns ielūgums uz grupu' : 'Atgādinājums par notikumu'}">
							Paziņojuma virsraksts
						</div>
						<div class="notif-desc">
							<span th:switch="${notif.type}">
								<span th:case="'INVITE'">Jūs esat uzaicināts pievienoties grupai</span>
								<span th:case="'REMINDER'">Jūsu notikums sākas drīz</span>
								<span th:case="*">Jums ir jauns paziņojums</span>
							</span>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div th:if="${#lists.isEmpty(notifications)}" class="cc-card">
			<div class="empty-state">
				<i class="bi bi-bell-slash d-block"></i>
				<h3>Nav paziņojumu</h3>
				<p>Šeit parādīsies paziņojumi par ielūgumiem un notikumiem.</p>
			</div>
		</div>

	</th:block>
</div>

</body>
</html>
