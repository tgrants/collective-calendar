<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="lv">
<head th:replace="fragments/layout :: head('Ielūgumi')"></head>
<body>

<div th:replace="fragments/layout :: body('Ielūgumi', ~{::main-content})">
	<th:block th:fragment="main-content">
		<div class="page-header">
			<h2>Ielūgumi uz grupām</h2>
		</div>

		<div th:if="${not #lists.isEmpty(invites)}" class="invite-list">
			<div th:each="invite : ${invites}" class="invite-item">
				<div class="invite-icon"><i class="bi bi-people"></i></div>
				<div class="invite-info">
					<div class="invite-group" th:text="${invite.group.name}">Grupas nosaukums</div>
					<div class="invite-date">
						Ielūgts:
						<span th:text="${#temporals.format(invite.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024</span>
					</div>
				</div>
				<div class="invite-actions">
					<form th:action="@{/groups/invites/{id}/accept(id=${invite.uid})}" method="post" class="d-inline">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<button type="submit" class="btn-cc-primary" style="padding:8px 16px;font-size:13px">
							<i class="bi bi-check-lg"></i> Pieņemt
						</button>
					</form>
					<form th:action="@{/groups/invites/{id}/decline(id=${invite.uid})}" method="post" class="d-inline">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<button type="submit" class="btn-cc-ghost" style="font-size:13px">
							<i class="bi bi-x-lg"></i> Noraidīt
						</button>
					</form>
				</div>
			</div>
		</div>

		<div th:if="${#lists.isEmpty(invites)}" class="cc-card">
			<div class="empty-state">
				<i class="bi bi-envelope-open d-block"></i>
				<h3>Nav neapstiprinātu ielūgumu</h3>
				<p>Kad kāds jūs uzaicinās uz grupu, ielūgums parādīsies šeit.</p>
			</div>
		</div>
	</th:block>
</div>

</body>
</html>
