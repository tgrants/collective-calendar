<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="lv">
<head th:replace="fragments/layout :: head('Grupa')"></head>
<body>

<div th:replace="fragments/layout :: body(${group.uid != null ? 'Rediģēt grupu' : 'Jauna grupa'}, ~{::main-content})">
	<th:block th:fragment="main-content">
		<div class="row justify-content-center">
			<div class="col-lg-6">

				<div class="mb-4">
					<a th:href="@{/groups}" class="btn-cc-ghost" style="font-size:13px">
						<i class="bi bi-arrow-left"></i> Atpakaļ uz grupām
					</a>
				</div>

				<div class="cc-card">
					<h2 style="font-family:var(--font-display);font-size:20px;font-weight:800;margin-bottom:24px"
						th:text="${group.uid != null ? 'Rediģēt grupu' : 'Izveidot jaunu grupu'}">
						Jauna grupa
					</h2>

					<form th:action="${group.uid != null ? '/groups/' + group.uid + '/edit' : '/groups/create'}"
						  method="post" th:object="${group}">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

						<div class="cc-form-group">
							<label class="cc-label" for="name">Grupas nosaukums</label>
							<input id="name" type="text" class="cc-input"
								   th:field="*{name}"
								   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
								   placeholder="Piemēram: Projekts X, Sporta klubs..."
								   maxlength="100" required>
							<div th:if="${#fields.hasErrors('name')}" class="cc-error" th:errors="*{name}"></div>
						</div>

						<div class="d-flex gap-3 mt-4">
							<button type="submit" class="btn-cc-primary">
								<i class="bi bi-check-lg"></i>
								<span th:text="${group.uid != null ? 'Saglabāt izmaiņas' : 'Izveidot grupu'}">Izveidot</span>
							</button>
							<a th:href="${group.uid != null ? '/groups/' + group.uid : '/groups'}"
							   class="btn-cc-ghost">Atcelt</a>
						</div>
					</form>
				</div>

			</div>
		</div>
	</th:block>
</div>

</body>
</html>
