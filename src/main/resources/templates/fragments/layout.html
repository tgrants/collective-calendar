<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — CollectiveCalendar'">CollectiveCalendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>

<body th:fragment="body(title, content)">
    <div class="app-wrapper">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <a th:href="@{/calendar}" class="brand-link">
                    <div class="brand-icon">
                        <i class="bi bi-calendar3"></i>
                    </div>
                    <span class="brand-name">Collective<br><strong>Calendar</strong></span>
                </a>
            </div>

            <div class="sidebar-nav">
                <div class="nav-section">
                    <span class="nav-label">Galvenais</span>
                    <a th:href="@{/calendar}" class="nav-item" th:classappend="${activePage == 'calendar'} ? 'active'">
                        <i class="bi bi-calendar-week"></i>
                        <span>Kalendārs</span>
                    </a>
                    <a th:href="@{/notifications}" class="nav-item" th:classappend="${activePage == 'notifications'} ? 'active'">
                        <i class="bi bi-bell"></i>
                        <span>Paziņojumi</span>
                        <span class="badge-dot" sec:authorize="isAuthenticated()" th:if="${unreadCount != null and unreadCount > 0}" th:text="${unreadCount}"></span>
                    </a>
                </div>

                <div class="nav-section">
                    <span class="nav-label">Grupas</span>
                    <a th:href="@{/groups}" class="nav-item" th:classappend="${activePage == 'groups'} ? 'active'">
                        <i class="bi bi-people"></i>
                        <span>Manas grupas</span>
                    </a>
                    <a th:href="@{/groups/invites}" class="nav-item" th:classappend="${activePage == 'invites'} ? 'active'">
                        <i class="bi bi-envelope-open"></i>
                        <span>Ielūgumi</span>
                    </a>
                    <a th:href="@{/groups/create}" class="nav-item" th:classappend="${activePage == 'group-create'} ? 'active'">
                        <i class="bi bi-plus-circle"></i>
                        <span>Jauna grupa</span>
                    </a>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="user-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
                    <div class="user-info">
                        <span class="user-name" sec:authentication="name">Lietotājs</span>
                        <span class="user-role">Dalībnieks</span>
                    </div>
                    <div class="dropdown">
                        <button class="btn btn-link user-menu-btn" data-bs-toggle="dropdown">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/settings}"><i class="bi bi-gear me-2"></i>Iestatījumi</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="dropdown-item text-danger" type="submit">
                                        <i class="bi bi-box-arrow-right me-2"></i>Iziet
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main content -->
        <main class="main-content">
            <div class="topbar">
                <button class="sidebar-toggle btn btn-link" id="sidebarToggle">
                    <i class="bi bi-list"></i>
                </button>
                <h1 class="page-title" th:text="${title}">Lapa</h1>
                <div class="topbar-actions">
                    <a th:href="@{/notifications}" class="topbar-icon-btn" th:title="Paziņojumi">
                        <i class="bi bi-bell"></i>
                    </a>
                </div>
            </div>

            <div class="content-area">
                <!-- Flash messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:replace="${content}"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
